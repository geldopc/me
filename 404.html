<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <title>Redirecionando...</title>
    <script type="text/javascript">
      const path = decodeURIComponent(window.location.pathname);
      const pathArray = path.split('/');
      
      // Se a rota não é a raiz /me/, redireciona para index.html
      if (pathArray[1] === 'me' && pathArray.length > 2) {
        window.location.replace(`/me/#${pathArray.slice(2).join('/')}`);
      }
    </script>
  </head>
  <body>
  </body>
</html>
